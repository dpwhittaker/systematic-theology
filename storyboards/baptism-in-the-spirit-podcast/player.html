<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcast Player</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

#player {
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative; cursor: pointer;
  user-select: none; -webkit-user-select: none;
}

#slide-img {
  max-width: 100vw; max-height: 100vh;
  width: 100%; height: 100%;
  object-fit: contain;
}

#overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.5);
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
#overlay.visible { opacity: 1; }
#overlay svg { width: 80px; height: 80px; fill: #fff; opacity: 0.8; }

#progress-bar {
  position: absolute; bottom: 0; left: 0;
  height: 4px; background: #00ff00;
  transition: width 0.25s linear;
  z-index: 10;
}

#section-label {
  position: absolute; top: 16px; left: 50%;
  transform: translateX(-50%);
  color: #fff; font-family: system-ui, sans-serif;
  font-size: 14px; background: rgba(0,0,0,0.6);
  padding: 6px 16px; border-radius: 20px;
  opacity: 0; transition: opacity 0.5s;
  z-index: 10; white-space: nowrap;
  pointer-events: none;
}
#section-label.visible { opacity: 1; }

#section-nav {
  position: absolute; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 10;
  pointer-events: none;
}
.nav-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.3); transition: background 0.3s;
  pointer-events: auto; cursor: pointer;
}
.nav-dot.active { background: #00ff00; }
.nav-dot.played { background: rgba(255,255,255,0.6); }

#loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #00ff00; font-family: monospace; font-size: 18px;
  background: #000; z-index: 20;
}
</style>
</head>
<body>

<div id="loading">Loading podcast...</div>

<div id="player" style="display:none">
  <img id="slide-img" src="" alt="">
  <div id="overlay">
    <svg viewBox="0 0 24 24"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>
  </div>
  <div id="progress-bar"></div>
  <div id="section-label"></div>
  <div id="section-nav"></div>
</div>

<script>
const STORYBOARD = 'baptism-in-the-spirit-podcast.md';

// Parse the storyboard markdown to extract sections with slides and audio
async function parseStoryboard() {
  const resp = await fetch(STORYBOARD);
  const text = await resp.text();
  const lines = text.split('\n');

  const sections = [];
  let current = null;

  for (const line of lines) {
    // Section header
    const h2 = line.match(/^## (.+)/);
    if (h2) {
      if (current) sections.push(current);
      current = { title: h2[1].trim(), slide: null, audio: null };
      continue;
    }
    if (!current) continue;

    // Slide image
    const slideMatch = line.match(/^!\[slide\]\(([^)]+)\)/);
    if (slideMatch) {
      current.slide = slideMatch[1];
      continue;
    }

    // Audio file
    const audioMatch = line.match(/^!\[audio\]\(([^)]+)\)/);
    if (audioMatch) {
      current.audio = audioMatch[1];
      continue;
    }
  }
  if (current) sections.push(current);

  // Filter to sections that have both slide and audio
  return sections.filter(s => s.slide && s.audio);
}

async function main() {
  const sections = await parseStoryboard();
  if (!sections.length) {
    document.getElementById('loading').textContent = 'No sections found.';
    return;
  }

  const player = document.getElementById('player');
  const slideImg = document.getElementById('slide-img');
  const overlay = document.getElementById('overlay');
  const progressBar = document.getElementById('progress-bar');
  const sectionLabel = document.getElementById('section-label');
  const sectionNav = document.getElementById('section-nav');
  const loading = document.getElementById('loading');

  // Build nav dots
  sections.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot';
    dot.title = s.title;
    dot.addEventListener('click', (e) => {
      e.stopPropagation();
      goToSection(i);
    });
    sectionNav.appendChild(dot);
  });
  const dots = sectionNav.querySelectorAll('.nav-dot');

  let currentIdx = -1;
  let audio = new Audio();
  let paused = false;
  let labelTimeout = null;

  function showLabel(text) {
    sectionLabel.textContent = text;
    sectionLabel.classList.add('visible');
    clearTimeout(labelTimeout);
    labelTimeout = setTimeout(() => sectionLabel.classList.remove('visible'), 3000);
  }

  function updateProgress() {
    if (audio.duration) {
      const pct = (audio.currentTime / audio.duration) * 100;
      progressBar.style.width = pct + '%';
    }
    if (!paused) requestAnimationFrame(updateProgress);
  }

  function goToSection(idx) {
    if (idx < 0 || idx >= sections.length) return;

    // Mark previous as played
    if (currentIdx >= 0) dots[currentIdx].classList.remove('active');
    for (let i = 0; i <= idx - 1; i++) dots[i].classList.add('played');

    currentIdx = idx;
    const section = sections[idx];

    // Update slide
    slideImg.src = section.slide;
    dots[idx].classList.add('active');
    dots[idx].classList.remove('played');
    showLabel(section.title);

    // Update audio
    audio.pause();
    audio.src = section.audio;
    audio.load();
    progressBar.style.width = '0%';
    paused = false;
    overlay.classList.remove('visible');

    audio.play().then(() => {
      requestAnimationFrame(updateProgress);
    }).catch(() => {
      // Autoplay blocked — show paused state
      paused = true;
      overlay.classList.add('visible');
    });
  }

  // Auto-advance when section audio ends
  audio.addEventListener('ended', () => {
    if (currentIdx < sections.length - 1) {
      goToSection(currentIdx + 1);
    } else {
      // Done — show paused overlay on last slide
      progressBar.style.width = '100%';
      paused = true;
      overlay.classList.add('visible');
      showLabel('Done');
    }
  });

  // Click to pause/unpause
  player.addEventListener('click', () => {
    if (paused) {
      audio.play();
      paused = false;
      overlay.classList.remove('visible');
      requestAnimationFrame(updateProgress);
    } else {
      audio.pause();
      paused = true;
      overlay.classList.add('visible');
    }
  });

  // Keyboard controls
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      player.click();
    } else if (e.key === 'ArrowRight') {
      if (currentIdx < sections.length - 1) goToSection(currentIdx + 1);
    } else if (e.key === 'ArrowLeft') {
      if (currentIdx > 0) goToSection(currentIdx - 1);
    }
  });

  // Preload first slide image
  slideImg.onload = () => {
    loading.style.display = 'none';
    player.style.display = 'flex';
    goToSection(0);
  };
  slideImg.onerror = () => {
    loading.textContent = 'Failed to load slide image.';
  };
  slideImg.src = sections[0].slide;
}

main();
</script>
</body>
</html>
